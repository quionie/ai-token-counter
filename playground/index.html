<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Token Counter Playground</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>AI Token Counter Playground</h1>
      <p class="subtitle">
        Estimate token count, approximate cost, and context usage before making API calls.
      </p>

      <label for="prompt-input">Paste your prompt here</label>
      <textarea
        id="prompt-input"
        rows="10"
        placeholder="Paste your prompt here..."
      ></textarea>

      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
        <option value="sonnet-4">sonnet-4</option>
        <option value="claude-3-5-sonnet">claude-3-5-sonnet</option>
        <option value="gemini-1.5-pro">gemini-1.5-pro</option>
        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      </select>

      <section class="results">
        <h2 id="result-title">OpenAI GPT-4o</h2>
        <div class="result-row">
          <span>Token Estimate</span>
          <strong id="token-estimate">0</strong>
        </div>
        <div class="result-row">
          <span>Estimated Cost</span>
          <strong id="cost-estimate">$0.000000</strong>
        </div>
        <div class="result-row">
          <span>Context Window Usage</span>
          <strong id="context-usage">0.00% of 128k</strong>
        </div>
        <div class="result-row">
          <span>Provider</span>
          <strong id="provider-value">OpenAI</strong>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
